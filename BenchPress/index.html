<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bench Press Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        :root { --accent: #ff6b35; --card-bg: #1a1a2e; --card-border: #2d2d44; }

        body {
            background: #0f0f1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15,15,26,0.96) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
        }
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent) !important;
            letter-spacing: -0.5px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: transform .2s, box-shadow .2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,53,.15); }
        .stat-label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: .25rem; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); line-height: 1; }
        .stat-sub { font-size: .75rem; color: #666; margin-top: .25rem; }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .panel-title { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 1rem; }

        .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        .btn-accent:hover { background: #e55a25; border-color: #e55a25; color: #fff; }

        .session-card {
            background: #111128;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: .75rem;
            transition: border-color .2s;
        }
        .session-card:hover { border-color: var(--accent); }
        .session-date { font-weight: 700; color: var(--accent); }

        .set-badge {
            background: #2d2d44;
            color: #ccc;
            padding: .15rem .55rem;
            border-radius: 6px;
            font-size: .8rem;
            font-family: monospace;
            display: inline-block;
            margin: .1rem .1rem .1rem 0;
        }
        .set-badge.top { background: rgba(255,107,53,.2); color: var(--accent); font-weight: 700; }

        .pr-badge {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            font-weight: 700;
            padding: .1rem .45rem;
            border-radius: 4px;
            font-size: .65rem;
            text-transform: uppercase;
            vertical-align: middle;
        }

        .modal-content { background: #1a1a2e; border: 1px solid var(--card-border); border-radius: 16px; }
        .form-control, .form-select { background: #111128; border-color: var(--card-border); color: #e0e0e0; }
        .form-control:focus, .form-select:focus {
            background: #111128;
            border-color: var(--accent);
            color: #e0e0e0;
            box-shadow: 0 0 0 .2rem rgba(255,107,53,.15);
        }
        .form-control::placeholder { color: #555; }

        .set-row {
            background: #111128;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: .6rem .75rem;
            margin-bottom: .45rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .set-num { font-size: .8rem; color: #666; min-width: 1.8rem; }

        .empty-state { text-align: center; padding: 3rem 1rem; color: #555; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; color: #333; }

        .spinner-overlay {
            position: fixed; inset: 0;
            background: rgba(15,15,26,.75);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .error-banner {
            background: rgba(220,53,69,.15);
            border: 1px solid rgba(220,53,69,.4);
            border-radius: 10px;
            padding: .75rem 1rem;
            color: #f8a0a0;
            margin-bottom: 1rem;
            font-size: .875rem;
        }

        @media (max-width: 576px) {
            .stat-value { font-size: 1.4rem; }
            .navbar-brand { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<!-- Loading overlay -->
<div class="spinner-overlay" id="loadingOverlay">
    <div class="spinner-border" style="color:var(--accent);width:3rem;height:3rem;" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-dark sticky-top">
    <div class="container">
        <span class="navbar-brand">
            <i class="bi bi-bar-chart-fill me-2"></i>BENCH TRACKER
        </span>
        <div class="d-flex gap-2 align-items-center">
            <button class="btn btn-sm btn-outline-secondary" onclick="window.exportData()" title="Export backup">
                <i class="bi bi-download"></i>
            </button>
            <label class="btn btn-sm btn-outline-secondary mb-0" title="Import backup" style="cursor:pointer">
                <i class="bi bi-upload"></i>
                <input type="file" id="importFile" accept=".json" style="display:none">
            </label>
            <button class="btn btn-accent btn-sm" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus-lg me-1"></i>Log Session
            </button>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div id="errorBanner" class="error-banner d-none"></div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label"><i class="bi bi-trophy me-1"></i>Best 1RM</div>
                <div class="stat-value" id="s-1rm">—</div>
                <div class="stat-sub" id="s-1rm-d">no data</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label"><i class="bi bi-lightning me-1"></i>Last Session</div>
                <div class="stat-value" id="s-last">—</div>
                <div class="stat-sub" id="s-last-d">no data</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label"><i class="bi bi-calendar-check me-1"></i>Sessions</div>
                <div class="stat-value" id="s-count">0</div>
                <div class="stat-sub">total logged</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label"><i class="bi bi-layers me-1"></i>Total Volume</div>
                <div class="stat-value" id="s-vol">0</div>
                <div class="stat-sub">kg lifted</div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="panel mb-4">
        <div class="panel-title">
            <i class="bi bi-graph-up me-2" style="color:var(--accent)"></i>Estimated 1RM Over Time
        </div>
        <div style="position:relative;height:200px">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <!-- History -->
    <div class="panel">
        <div class="panel-title">
            <i class="bi bi-clock-history me-2" style="color:var(--accent)"></i>Session History
        </div>
        <div id="sessionList">
            <div class="empty-state"><i class="bi bi-dumbbell"></i>Loading sessions...</div>
        </div>
    </div>
</div>

<!-- Add Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Log Bench Session</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label text-secondary small">Date</label>
                    <input type="date" class="form-control" id="addDate">
                </div>
                <label class="form-label text-secondary small">Sets</label>
                <div id="addSets"></div>
                <button class="btn btn-outline-secondary btn-sm w-100 mt-2" onclick="window.addSetRow('addSets')">
                    <i class="bi bi-plus me-1"></i>Add Set
                </button>
                <div class="mt-3">
                    <label class="form-label text-secondary small">Notes (optional)</label>
                    <textarea class="form-control" id="addNotes" rows="2" placeholder="How did it feel?"></textarea>
                </div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-accent px-4" onclick="window.saveSession()">
                    <i class="bi bi-check-lg me-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Edit Session</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label text-secondary small">Date</label>
                    <input type="date" class="form-control" id="editDate">
                </div>
                <label class="form-label text-secondary small">Sets</label>
                <div id="editSets"></div>
                <button class="btn btn-outline-secondary btn-sm w-100 mt-2" onclick="window.addSetRow('editSets')">
                    <i class="bi bi-plus me-1"></i>Add Set
                </button>
                <div class="mt-3">
                    <label class="form-label text-secondary small">Notes (optional)</label>
                    <textarea class="form-control" id="editNotes" rows="2" placeholder="How did it feel?"></textarea>
                </div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-accent px-4" onclick="window.updateSession()">
                    <i class="bi bi-check-lg me-1"></i>Update
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import {
        getFirestore, collection, addDoc, getDocs,
        deleteDoc, doc, updateDoc
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    // ── Firebase init ────────────────────────────────────────────────
    const app = initializeApp({
        apiKey: "AIzaSyAXFGXQGTFdRlazzK_QmTWdSzuYGyNgmoI",
        authDomain: "tracker-628fc.firebaseapp.com",
        projectId: "tracker-628fc",
        storageBucket: "tracker-628fc.firebasestorage.app",
        messagingSenderId: "11574316672",
        appId: "1:11574316772:web:1d1bfa319a852d8f706065"
    });
    const db = getFirestore(app);
    const COLL = 'sessions';

    // ── In-memory cache ──────────────────────────────────────────────
    let sessions = []; // [{ id, date, sets:[{weight,reps}], notes }]

    // ── Firebase CRUD ────────────────────────────────────────────────
    async function loadSessions() {
        const snap = await getDocs(collection(db, COLL));
        sessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        sessions.sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    async function addSessionDB(data) {
        const ref = await addDoc(collection(db, COLL), data);
        sessions.push({ id: ref.id, ...data });
        sessions.sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    async function updateSessionDB(id, data) {
        await updateDoc(doc(db, COLL, id), data);
        const i = sessions.findIndex(s => s.id === id);
        if (i !== -1) sessions[i] = { id, ...data };
        sessions.sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    async function deleteSessionDB(id) {
        await deleteDoc(doc(db, COLL, id));
        sessions = sessions.filter(s => s.id !== id);
    }

    // ── Calculations ─────────────────────────────────────────────────
    const e1rm  = (w, r) => r === 1 ? w : Math.round(w * (1 + r / 30));
    const best1RM  = s => Math.max(...s.sets.map(x => e1rm(x.weight, x.reps)));
    const volume   = s => s.sets.reduce((t, x) => t + x.weight * x.reps, 0);
    const topWeight = s => Math.max(...s.sets.map(x => x.weight));

    // ── Stats ────────────────────────────────────────────────────────
    function renderStats() {
        if (!sessions.length) {
            document.getElementById('s-1rm').textContent = '—';
            document.getElementById('s-1rm-d').textContent = 'no data';
            document.getElementById('s-last').textContent = '—';
            document.getElementById('s-last-d').textContent = 'no data';
            document.getElementById('s-count').textContent = '0';
            document.getElementById('s-vol').textContent = '0';
            return;
        }
        let best = 0, bestDate = '';
        sessions.forEach(s => {
            const r = best1RM(s);
            if (r > best) { best = r; bestDate = s.date; }
        });
        document.getElementById('s-1rm').textContent = best + ' kg';
        document.getElementById('s-1rm-d').textContent = fmtDate(bestDate);
        const last = sessions[sessions.length - 1];
        document.getElementById('s-last').textContent = topWeight(last) + ' kg';
        document.getElementById('s-last-d').textContent = fmtDate(last.date);
        document.getElementById('s-count').textContent = sessions.length;
        const vol = sessions.reduce((t, s) => t + volume(s), 0);
        document.getElementById('s-vol').textContent = vol >= 1000 ? (vol / 1000).toFixed(1) + 't' : vol + '';
    }

    // ── Chart ────────────────────────────────────────────────────────
    let chart = null;
    function renderChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: sessions.map(s => fmtDate(s.date)),
                datasets: [{
                    data: sessions.map(s => best1RM(s)),
                    borderColor: '#ff6b35',
                    backgroundColor: 'rgba(255,107,53,.1)',
                    borderWidth: 2.5,
                    pointBackgroundColor: '#ff6b35',
                    pointBorderColor: '#ff6b35',
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1a1a2e',
                        borderColor: '#2d2d44',
                        borderWidth: 1,
                        titleColor: '#ff6b35',
                        bodyColor: '#e0e0e0',
                        callbacks: { label: c => `Est. 1RM: ${c.raw} kg` }
                    }
                },
                scales: {
                    x: { grid: { color: '#1f1f35' }, ticks: { color: '#888', maxTicksLimit: 8 } },
                    y: { grid: { color: '#1f1f35' }, ticks: { color: '#888', callback: v => v + ' kg' } }
                }
            }
        });
    }

    // ── Session List ─────────────────────────────────────────────────
    function renderList() {
        const el = document.getElementById('sessionList');
        if (!sessions.length) {
            el.innerHTML = `<div class="empty-state">
                <i class="bi bi-dumbbell"></i>
                <p class="mb-2">No sessions yet</p>
                <button class="btn btn-accent btn-sm" data-bs-toggle="modal" data-bs-target="#addModal">Log your first session</button>
            </div>`;
            return;
        }
        const globalBest = Math.max(...sessions.map(s => best1RM(s)));
        el.innerHTML = [...sessions].reverse().map(s => {
            const rm = best1RM(s);
            const isPR = rm === globalBest;
            const bestSet = s.sets.reduce((b, x) =>
                e1rm(x.weight, x.reps) > e1rm(b.weight, b.reps) ? x : b
            );
            const setsHtml = s.sets.map(x =>
                `<span class="set-badge${x === bestSet ? ' top' : ''}">${x.weight}kg×${x.reps}</span>`
            ).join('');
            const notesHtml = s.notes
                ? `<div class="text-secondary small mt-2" style="font-style:italic">"${esc(s.notes)}"</div>`
                : '';
            return `<div class="session-card">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <span class="session-date">${fmtDate(s.date)}</span>
                        ${isPR ? ' <span class="pr-badge">PR</span>' : ''}
                    </div>
                    <div class="d-flex gap-1">
                        <button class="btn btn-sm btn-outline-secondary" onclick="window.openEdit('${s.id}')">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="window.deleteSession('${s.id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-1">${setsHtml}</div>
                <div class="d-flex gap-3 mt-2">
                    <span class="small text-secondary">
                        <i class="bi bi-trophy me-1" style="color:var(--accent)"></i>
                        Est. 1RM: <strong class="text-light">${rm} kg</strong>
                    </span>
                    <span class="small text-secondary">
                        <i class="bi bi-layers me-1"></i>
                        Vol: <strong class="text-light">${volume(s)} kg</strong>
                    </span>
                </div>
                ${notesHtml}
            </div>`;
        }).join('');
    }

    function refresh() { renderStats(); renderChart(); renderList(); }

    // ── Set Rows ─────────────────────────────────────────────────────
    window.addSetRow = function(containerId, weight = '', reps = '') {
        const c = document.getElementById(containerId);
        const n = c.children.length + 1;
        const d = document.createElement('div');
        d.className = 'set-row';
        d.innerHTML = `
            <span class="set-num">S${n}</span>
            <input type="number" class="form-control form-control-sm" placeholder="kg"
                   min="0" step="0.5" value="${weight}" style="width:80px">
            <span class="text-secondary">×</span>
            <input type="number" class="form-control form-control-sm" placeholder="reps"
                   min="1" max="100" value="${reps}" style="width:70px">
            <button class="btn btn-sm btn-outline-danger ms-auto"
                    onclick="this.closest('.set-row').remove(); window.renumSets('${containerId}')">
                <i class="bi bi-x"></i>
            </button>`;
        c.appendChild(d);
    };

    window.renumSets = function(containerId) {
        document.getElementById(containerId).querySelectorAll('.set-row').forEach((r, i) => {
            r.querySelector('.set-num').textContent = `S${i + 1}`;
        });
    };

    function getSets(containerId) {
        return [...document.getElementById(containerId).querySelectorAll('.set-row')].flatMap(r => {
            const ins = r.querySelectorAll('input[type="number"]');
            const w = parseFloat(ins[0].value);
            const rep = parseInt(ins[1].value);
            return (w > 0 && rep > 0) ? [{ weight: w, reps: rep }] : [];
        });
    }

    // ── Add Session ──────────────────────────────────────────────────
    document.getElementById('addModal').addEventListener('show.bs.modal', () => {
        document.getElementById('addDate').value = today();
        document.getElementById('addNotes').value = '';
        document.getElementById('addSets').innerHTML = '';
        window.addSetRow('addSets');
        window.addSetRow('addSets');
        window.addSetRow('addSets');
    });

    window.saveSession = async function() {
        const date = document.getElementById('addDate').value;
        const sets = getSets('addSets');
        const notes = document.getElementById('addNotes').value.trim();
        if (!date || !sets.length) { alert('Add a date and at least one valid set.'); return; }
        setLoading(true);
        try {
            await addSessionDB({ date, sets, notes });
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            refresh();
        } catch (e) { showError('Could not save session: ' + e.message); }
        setLoading(false);
    };

    // ── Edit Session ─────────────────────────────────────────────────
    window.openEdit = function(id) {
        const s = sessions.find(x => x.id === id);
        if (!s) return;
        document.getElementById('editId').value = id;
        document.getElementById('editDate').value = s.date;
        document.getElementById('editNotes').value = s.notes || '';
        document.getElementById('editSets').innerHTML = '';
        s.sets.forEach(x => window.addSetRow('editSets', x.weight, x.reps));
        new bootstrap.Modal(document.getElementById('editModal')).show();
    };

    window.updateSession = async function() {
        const id = document.getElementById('editId').value;
        const date = document.getElementById('editDate').value;
        const sets = getSets('editSets');
        const notes = document.getElementById('editNotes').value.trim();
        if (!date || !sets.length) { alert('Add a date and at least one valid set.'); return; }
        setLoading(true);
        try {
            await updateSessionDB(id, { date, sets, notes });
            bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
            refresh();
        } catch (e) { showError('Could not update session: ' + e.message); }
        setLoading(false);
    };

    // ── Delete ───────────────────────────────────────────────────────
    window.deleteSession = async function(id) {
        if (!confirm('Delete this session?')) return;
        setLoading(true);
        try { await deleteSessionDB(id); refresh(); }
        catch (e) { showError('Could not delete: ' + e.message); }
        setLoading(false);
    };

    // ── Export / Import ──────────────────────────────────────────────
    window.exportData = function() {
        const blob = new Blob([JSON.stringify({ sessions }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `bench-backup-${today()}.json`;
        a.click();
    };

    document.getElementById('importFile').addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const text = await file.text();
            const imported = JSON.parse(text);
            if (!Array.isArray(imported.sessions)) { alert('Invalid backup file.'); return; }
            if (!confirm(`Import ${imported.sessions.length} sessions? This will REPLACE all current data.`)) return;
            setLoading(true);
            for (const s of [...sessions]) await deleteSessionDB(s.id);
            for (const s of imported.sessions) {
                await addSessionDB({ date: s.date, sets: s.sets, notes: s.notes || '' });
            }
            refresh();
            alert('Imported successfully!');
        } catch (err) {
            showError('Could not import: ' + err.message);
        }
        setLoading(false);
        e.target.value = '';
    });

    // ── Helpers ──────────────────────────────────────────────────────
    const today   = () => new Date().toISOString().split('T')[0];
    const fmtDate = d => new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const esc     = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    function setLoading(show) {
        document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }
    function showError(msg) {
        const el = document.getElementById('errorBanner');
        el.textContent = '⚠ ' + msg;
        el.classList.remove('d-none');
        setTimeout(() => el.classList.add('d-none'), 6000);
    }

    // ── Boot ─────────────────────────────────────────────────────────
    try {
        setLoading(true);
        await loadSessions();
        refresh();
    } catch (e) {
        showError('Could not connect to database. Check Firestore rules or your internet connection.');
    }
    setLoading(false);
</script>
</body>
</html>
