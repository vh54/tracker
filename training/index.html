<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --accent: #ff6b35;
            --card-bg: #1a1a2e;
            --card-border: #2d2d44;
            --green: #4ade80;
            --green-bg: rgba(74,222,128,.12);
            --amber: #fbbf24;
            --amber-bg: rgba(251,191,36,.12);
            --blue: #60a5fa;
            --blue-bg: rgba(96,165,250,.12);
        }
        * { box-sizing: border-box; }
        body { background: #0f0f1a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

        /* ── Navbar ── */
        .navbar { background: rgba(15,15,26,.96) !important; backdrop-filter: blur(10px); border-bottom: 1px solid var(--card-border); }
        .navbar-brand { font-size: 1.3rem; font-weight: 800; color: var(--accent) !important; letter-spacing: -.5px; }

        /* ── Tabs ── */
        .tab-bar { display: flex; gap: 4px; padding: 1rem 0 0; border-bottom: 1px solid var(--card-border); margin-bottom: 1.5rem; }
        .tab-btn { background: none; border: none; border-bottom: 2.5px solid transparent; color: #888; font-size: .9rem; font-weight: 600; padding: .5rem 1.1rem .75rem; cursor: pointer; transition: color .15s, border-color .15s; margin-bottom: -1px; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn:hover:not(.active) { color: #ccc; }

        /* ── Stat pills ── */
        .stat-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .stat-pill { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #888; font-family: monospace; }
        .stat-pill strong { color: #e0e0e0; font-weight: 500; }

        /* ── Progress bar ── */
        .prog-bar-wrap { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 14px 16px; margin-bottom: 1.25rem; }
        .prog-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; font-family: monospace; margin-bottom: 8px; }
        .bar-track { background: var(--card-border); border-radius: 4px; height: 6px; overflow: hidden; }
        .bar-fill { height: 6px; border-radius: 4px; transition: width .4s ease; }

        /* ── Save indicator ── */
        .save-row { font-family: monospace; font-size: 11px; color: #666; text-align: right; margin-bottom: 10px; min-height: 14px; }

        /* ── Flat rows (bench + running) ── */
        .flat-row { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
        .flat-row.is-today { border-color: var(--accent); }
        .flat-row.is-past-done { opacity: .45; }
        .flat-hdr { display: flex; align-items: center; padding: 10px 14px; gap: 10px; cursor: pointer; user-select: none; transition: background .12s; }
        .flat-hdr:hover { background: #111128; }
        .flat-date { font-family: monospace; font-size: 12px; color: #888; min-width: 82px; }
        .flat-title { flex: 1; font-size: 14px; font-weight: 500; }
        .flat-tag { font-family: monospace; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
        .tag-normal { background: var(--blue-bg); color: var(--blue); }
        .tag-goal { background: var(--amber-bg); color: var(--amber); }
        .tag-done { background: var(--green-bg); color: var(--green); }
        .flat-prog { font-family: monospace; font-size: 11px; color: #666; min-width: 28px; text-align: right; }
        .flat-chev { color: #666; font-size: 10px; transition: transform .2s; }
        .flat-body { display: none; }
        .flat-body.open { display: block; }

        /* ── Exercise rows (bench) ── */
        .exercise-row { display: flex; align-items: center; padding: 9px 14px; gap: 10px; cursor: pointer; border-top: 1px solid var(--card-border); transition: background .1s; }
        .exercise-row:hover { background: #111128; }
        .ex-cb { width: 17px; height: 17px; border: 1.5px solid var(--card-border); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--card-bg); transition: background .15s, border-color .15s; }
        .ex-cb.checked { background: var(--green); border-color: var(--green); }
        .ex-check { display: none; }
        .ex-cb.checked .ex-check { display: block; }
        .ex-name { font-size: 13px; flex: 1; }
        .exercise-row.done .ex-name { text-decoration: line-through; color: #555; }
        .ex-detail { font-family: monospace; font-size: 11px; color: #666; }

        /* ── Run checkbox ── */
        .run-cb { width: 20px; height: 20px; border: 1.5px solid var(--card-border); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--card-bg); transition: background .15s, border-color .15s; cursor: pointer; flex-shrink: 0; }
        .run-cb.checked { background: var(--blue); border-color: var(--blue); }
        .run-check { display: none; }
        .run-cb.checked .run-check { display: block; }

        /* ── Schedule tab ── */
        .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 10px 14px; }
        .week-nav-btn { background: none; border: 1px solid var(--card-border); color: #888; border-radius: 6px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: color .15s, border-color .15s; }
        .week-nav-btn:hover { color: #e0e0e0; border-color: #555; }
        .week-nav-label { font-weight: 600; font-size: .9rem; text-align: center; }
        .week-nav-today { font-size: .72rem; color: #555; cursor: pointer; }
        .week-nav-today:hover { color: var(--accent); }

        .day-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
        .day-card.is-today { border-color: var(--accent); }
        .day-card.is-past { opacity: .55; }
        .day-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .day-label { font-size: .75rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .day-date-num { font-size: .95rem; font-weight: 600; color: #e0e0e0; }
        .today-badge { font-size: .62rem; background: var(--accent); color: #fff; border-radius: 4px; padding: 1px 6px; font-weight: 700; margin-left: 6px; vertical-align: middle; }
        .activity-pills { display: flex; flex-wrap: wrap; gap: 5px; margin: 6px 0 4px; }
        .pill { font-size: .7rem; padding: 2px 8px; border-radius: 10px; font-weight: 500; line-height: 1.7; }
        .pill-bench { background: var(--green-bg); color: var(--green); }
        .pill-run { background: var(--blue-bg); color: var(--blue); }
        .pill-custom { background: var(--amber-bg); color: var(--amber); display: inline-flex; align-items: center; gap: 4px; }
        .pill-del { background: none; border: none; color: inherit; padding: 0; line-height: 1; cursor: pointer; font-size: .7rem; opacity: .65; }
        .pill-del:hover { opacity: 1; }

        .add-event-area { margin-top: 6px; }
        .add-event-btn { font-size: .75rem; color: #555; background: none; border: 1px dashed #333; border-radius: 6px; padding: 2px 9px; cursor: pointer; transition: color .15s, border-color .15s; }
        .add-event-btn:hover { color: #aaa; border-color: #555; }
        .event-input-row { display: flex; gap: 5px; align-items: center; }
        .event-input { background: #111128; border: 1px solid var(--card-border); color: #e0e0e0; border-radius: 6px; padding: 3px 8px; font-size: .8rem; flex: 1; outline: none; }
        .event-input:focus { border-color: var(--accent); }
        .event-save-btn { background: var(--accent); border: none; color: #fff; border-radius: 6px; padding: 3px 10px; font-size: .8rem; cursor: pointer; font-weight: 600; flex-shrink: 0; }
        .event-cancel-btn { background: none; border: none; color: #555; padding: 0 2px; cursor: pointer; font-size: 1rem; line-height: 1; }
        .event-cancel-btn:hover { color: #aaa; }

        /* ── Misc ── */
        .spinner-overlay { position: fixed; inset: 0; background: rgba(15,15,26,.75); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .error-banner { background: rgba(220,53,69,.15); border: 1px solid rgba(220,53,69,.4); border-radius: 10px; padding: .75rem 1rem; color: #f8a0a0; margin-bottom: 1rem; font-size: .875rem; }
        @media (max-width: 576px) { .navbar-brand { font-size: 1.1rem; } .flat-tag { display: none; } }
    </style>
</head>
<body>

<div class="spinner-overlay" id="loadingOverlay">
    <div class="spinner-border" style="color:var(--accent);width:3rem;height:3rem;" role="status"></div>
</div>

<nav class="navbar navbar-dark sticky-top">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-bar-chart-fill me-2"></i>TRAINING TRACKER</span>
    </div>
</nav>

<div class="container py-0">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="window.switchTab('schedule',this)">
            <i class="bi bi-calendar3 me-1"></i>Schedule
        </button>
        <button class="tab-btn" onclick="window.switchTab('running',this)">
            <i class="bi bi-person-walking me-1"></i>Running
        </button>
        <button class="tab-btn" onclick="window.switchTab('bench',this)">
            <i class="bi bi-dumbbell me-1"></i>Bench
        </button>
    </div>

    <div id="errorBanner" class="error-banner d-none"></div>

    <!-- ════ SCHEDULE TAB ════ -->
    <div id="tab-schedule">
        <div class="week-nav">
            <button class="week-nav-btn" onclick="window.navWeek(-1)" title="Previous week">
                <i class="bi bi-chevron-left"></i>
            </button>
            <div style="text-align:center">
                <div class="week-nav-label" id="week-nav-label">—</div>
                <div class="week-nav-today" onclick="window.goToday()">go to today</div>
            </div>
            <button class="week-nav-btn" onclick="window.navWeek(1)" title="Next week">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>
        <div class="save-row" id="sched-save-indicator"></div>
        <div id="day-cards"></div>
    </div>

    <!-- ════ RUNNING TAB ════ -->
    <div id="tab-running" style="display:none">
        <div class="stat-pills">
            <div class="stat-pill">Runs done: <strong id="r-runs-done">0</strong></div>
            <div class="stat-pill">km logged: <strong id="r-km-done">0</strong></div>
            <div class="stat-pill">Days to race: <strong id="r-days-left">—</strong></div>
        </div>
        <div class="prog-bar-wrap">
            <div class="prog-bar-label"><span>Race readiness · 20 km on 31 May</span><span id="r-overall-pct">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="r-overall-bar" style="width:0%;background:var(--blue)"></div></div>
        </div>
        <div class="save-row" id="r-save-indicator"></div>
        <div id="run-list"></div>
    </div>

    <!-- ════ BENCH TAB ════ -->
    <div id="tab-bench" style="display:none">
        <div class="stat-pills">
            <div class="stat-pill">Sessions done: <strong id="b-sessions-done">0</strong></div>
            <div class="stat-pill">Exercises done: <strong id="b-exercises-done">0</strong></div>
            <div class="stat-pill">Remaining: <strong id="b-sessions-left">0</strong></div>
        </div>
        <div class="prog-bar-wrap">
            <div class="prog-bar-label"><span>Bench progress · goal 80 kg</span><span id="b-overall-pct">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="b-overall-bar" style="width:0%;background:var(--green)"></div></div>
        </div>
        <div class="save-row" id="b-save-indicator"></div>
        <div id="bench-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

const app = initializeApp({
    apiKey: "AIzaSyAXFGXQGTFdRlazzK_QmTWdSzuYGyNgmoI",
    authDomain: "tracker-628fc.firebaseapp.com",
    projectId: "tracker-628fc",
    storageBucket: "tracker-628fc.firebasestorage.app",
    messagingSenderId: "11574316672",
    appId: "1:11574316672:web:1d1bfa319a852d8f706065"
});
const db = getFirestore(app);

// ═══════════════════════════════════════════════════
// HELPERS (defined first — used in data setup below)
// ═══════════════════════════════════════════════════

const MONTHS    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_SH   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_LNG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function isoDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDay(d) { return `${DAYS_SH[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`; }
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setLoading(show) { document.getElementById('loadingOverlay').style.display = show?'flex':'none'; }
function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = '⚠ '+msg; el.classList.remove('d-none');
    setTimeout(()=>el.classList.add('d-none'), 6000);
}
function setIndicator(id, msg) { const el=document.getElementById(id); if(el) el.textContent=msg; }

function calcPace(km, timeStr) {
    if (!km||!timeStr) return '—';
    const parts = timeStr.split(':');
    if (parts.length!==2) return '—';
    const totalSec = parseInt(parts[0])*60 + parseInt(parts[1]);
    const sPerKm = totalSec / km;
    return `${Math.floor(sPerKm/60)}:${Math.round(sPerKm%60).toString().padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════
// PLAN DATA
// ═══════════════════════════════════════════════════

const EXERCISES = [
    { id: 'bench',    name: 'Bench press',    detail: w => `3 × 10 · ${w} kg` },
    { id: 'rows',     name: 'Dumbbell rows',  detail: () => '3 × 10 each side · 10–12 kg p/side' },
    { id: 'shoulder', name: 'Shoulder press', detail: () => '3 × 8 · 20–25 kg' },
    { id: 'dips',     name: 'Tricep dips',    detail: () => '3 × 10 · bodyweight' },
];

const WEIGHTS = [40,40,42.5,42.5,45,45,47.5,47.5,50,50,52.5,52.5,55,55,57.5,57.5,60,60,62.5,62.5,65,65,67.5,67.5,70,70,72.5,72.5,75,75,77.5,77.5,80,80,80];

// Build bench sessions (Mon + Thu, 25 Mar → 31 Jul 2026)
const planSessions = [];
{
    let sCount = 0;
    let cur = new Date(2026,2,25,0,0,0,0);
    const end = new Date(2026,6,31,0,0,0,0);
    while (cur <= end) {
        const dow = cur.getDay();
        if (dow===1||dow===4) {
            const wk = Math.floor(sCount/2);
            const weight = WEIGHTS[Math.min(wk, WEIGHTS.length-1)];
            planSessions.push({
                date: new Date(cur),
                key: isoDate(cur),
                week: wk,
                indexInWeek: sCount%2,
                weight,
                isGoal: weight>=80
            });
            sCount++;
        }
        cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+1, 0,0,0,0);
    }
}

// Flat run list
const allRuns = [
    {id:'w1r1',date:'2026-03-30',km:6,  pace:'5:15–5:30/km'},
    {id:'w1r2',date:'2026-04-02',km:8,  pace:'5:15–5:30/km'},
    {id:'w2r1',date:'2026-04-06',km:7,  pace:'5:10–5:25/km'},
    {id:'w2r2',date:'2026-04-09',km:10, pace:'5:15–5:30/km'},
    {id:'w3r1',date:'2026-04-13',km:5,  pace:'5:20–5:40/km'},
    {id:'w3r2',date:'2026-04-16',km:8,  pace:'5:20–5:40/km'},
    {id:'w4r1',date:'2026-04-20',km:8,  pace:'5:10–5:25/km'},
    {id:'w4r2',date:'2026-04-23',km:13, pace:'5:15–5:30/km'},
    {id:'w5r1',date:'2026-04-27',km:9,  pace:'5:10–5:25/km'},
    {id:'w5r2',date:'2026-04-30',km:15, pace:'5:15–5:30/km'},
    {id:'w6r1',date:'2026-05-04',km:6,  pace:'5:20–5:40/km'},
    {id:'w6r2',date:'2026-05-07',km:10, pace:'5:20–5:40/km'},
    {id:'w7r1',date:'2026-05-11',km:10, pace:'5:10–5:25/km'},
    {id:'w7r2',date:'2026-05-14',km:17, pace:'5:15–5:30/km'},
    {id:'w8r1',date:'2026-05-18',km:7,  pace:'5:10–5:20/km'},
    {id:'w8r2',date:'2026-05-21',km:12, pace:'5:10–5:20/km'},
    {id:'w9r1',date:'2026-05-25',km:5,  pace:'easy'},
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════

let planState      = {};   // bench: { "2026-03-25__bench": true, … }
let runState       = {};   // run:   { "w1r1": { done, actualKm, actualTime }, … }
let scheduleEvents = {};   // sched: { "2026-03-30": ["event text", …], … }

let weekOffset     = 0;
let benchOpen      = {};   // { sessionKey: bool }
let runOpen        = {};   // { runId: bool }

let planSaveTimer = null, runSaveTimer = null, schedSaveTimer = null;

// ═══════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════

async function loadPlanState() {
    const snap = await getDoc(doc(db,'planState','bench'));
    if (snap.exists()) planState = snap.data().exercises || {};
}
async function loadRunState() {
    const snap = await getDoc(doc(db,'planState','running'));
    if (snap.exists()) runState = snap.data().runs || {};
}
async function loadScheduleEvents() {
    const snap = await getDoc(doc(db,'planState','schedule'));
    if (snap.exists()) scheduleEvents = snap.data().events || {};
}

function savePlan() {
    clearTimeout(planSaveTimer);
    planSaveTimer = setTimeout(async () => {
        try {
            await setDoc(doc(db,'planState','bench'), { exercises: planState });
            setIndicator('b-save-indicator','saved ✓'); setTimeout(()=>setIndicator('b-save-indicator',''), 600);
        } catch(e) { setIndicator('b-save-indicator','save error'); }
    }, 300);
}
function saveRun() {
    clearTimeout(runSaveTimer);
    runSaveTimer = setTimeout(async () => {
        try {
            await setDoc(doc(db,'planState','running'), { runs: runState });
            setIndicator('r-save-indicator','saved ✓'); setTimeout(()=>setIndicator('r-save-indicator',''), 600);
        } catch(e) { setIndicator('r-save-indicator','save error'); }
    }, 300);
}
function saveSched() {
    clearTimeout(schedSaveTimer);
    schedSaveTimer = setTimeout(async () => {
        try {
            await setDoc(doc(db,'planState','schedule'), { events: scheduleEvents });
            setIndicator('sched-save-indicator','saved ✓'); setTimeout(()=>setIndicator('sched-save-indicator',''), 600);
        } catch(e) { setIndicator('sched-save-indicator','save error'); }
    }, 300);
}

// ═══════════════════════════════════════════════════
// SCHEDULE TAB
// ═══════════════════════════════════════════════════

function getWeekDates(offset=0) {
    const today = new Date(); today.setHours(0,0,0,0);
    const dow = today.getDay();
    const diff = dow===0 ? -6 : 1-dow;           // shift to Monday
    const monday = new Date(today); monday.setDate(today.getDate()+diff+offset*7);
    return Array.from({length:7}, (_,i) => {
        const d = new Date(monday); d.setDate(monday.getDate()+i); d.setHours(0,0,0,0); return d;
    });
}

window.navWeek  = function(dir) { weekOffset += dir; renderSchedule(); };
window.goToday  = function()    { weekOffset = 0;    renderSchedule(); };

window.renderSchedule = function() {
    const today = new Date(); today.setHours(0,0,0,0);
    const dates = getWeekDates(weekOffset);
    const d1 = dates[0], d7 = dates[6];

    document.getElementById('week-nav-label').textContent =
        `${d1.getDate()} ${MONTHS[d1.getMonth()]} – ${d7.getDate()} ${MONTHS[d7.getMonth()]} ${d7.getFullYear()}`;

    const container = document.getElementById('day-cards');
    container.innerHTML = '';

    dates.forEach(d => {
        const iso = isoDate(d);
        const isToday = d.getTime()===today.getTime();
        const isPast  = d < today;

        const benchSess = planSessions.find(s => s.key===iso);
        const run       = allRuns.find(r => r.date===iso);
        const events    = scheduleEvents[iso] || [];

        const card = document.createElement('div');
        card.className = 'day-card'+(isToday?' is-today':(!isToday&&isPast?' is-past':''));

        let pillsHtml = '';
        if (benchSess) {
            const wLabel = benchSess.weight%1===0?benchSess.weight+' kg':benchSess.weight.toFixed(1)+' kg';
            const done = EXERCISES.every(ex => planState[`${benchSess.key}__${ex.id}`]);
            pillsHtml += `<span class="pill pill-bench">${done?'✓ ':''}<i class="bi bi-dumbbell"></i> Bench ${wLabel}</span>`;
        }
        if (run) {
            const rs = runState[run.id]||{};
            pillsHtml += `<span class="pill pill-run">${rs.done?'✓ ':''}<i class="bi bi-person-running"></i> Run ${run.km} km</span>`;
        }
        events.forEach((ev, idx) => {
            pillsHtml += `<span class="pill pill-custom">${esc(ev)}<button class="pill-del" onclick="window.deleteEvent('${iso}',${idx})" title="Remove">×</button></span>`;
        });

        card.innerHTML = `
            <div class="day-head">
                <div>
                    <div class="day-label">${DAYS_LNG[d.getDay()]}</div>
                    <div class="day-date-num">${d.getDate()} ${MONTHS[d.getMonth()]}${isToday?'<span class="today-badge">today</span>':''}</div>
                </div>
            </div>
            ${pillsHtml?`<div class="activity-pills">${pillsHtml}</div>`:''}
            <div class="add-event-area" id="add-area-${iso}">
                <button class="add-event-btn" onclick="window.showEventInput('${iso}')"><i class="bi bi-plus-sm"></i> add event</button>
            </div>`;

        container.appendChild(card);
    });
};

window.showEventInput = function(iso) {
    const area = document.getElementById('add-area-'+iso);
    if (!area) return;
    area.innerHTML = `
        <div class="event-input-row">
            <input class="event-input" type="text" id="event-inp-${iso}" placeholder="e.g. meal prep, physio…"
                onkeydown="if(event.key==='Enter')window.saveEvent('${iso}');if(event.key==='Escape')window.renderSchedule();">
            <button class="event-save-btn" onclick="window.saveEvent('${iso}')">Add</button>
            <button class="event-cancel-btn" onclick="window.renderSchedule()" title="Cancel">✕</button>
        </div>`;
    document.getElementById('event-inp-'+iso)?.focus();
};

window.saveEvent = function(iso) {
    const inp = document.getElementById('event-inp-'+iso);
    if (!inp) return;
    const val = inp.value.trim();
    if (!val) { window.renderSchedule(); return; }
    if (!scheduleEvents[iso]) scheduleEvents[iso] = [];
    scheduleEvents[iso].push(val);
    saveSched();
    window.renderSchedule();
};

window.deleteEvent = function(iso, idx) {
    if (!scheduleEvents[iso]) return;
    scheduleEvents[iso].splice(idx, 1);
    if (!scheduleEvents[iso].length) delete scheduleEvents[iso];
    saveSched();
    window.renderSchedule();
};

// ═══════════════════════════════════════════════════
// RUNNING TAB — flat list
// ═══════════════════════════════════════════════════

function renderRun() {
    const today = new Date(); today.setHours(0,0,0,0);
    const RACE = new Date(2026,4,31,0,0,0,0);
    const daysLeft = Math.max(0, Math.ceil((RACE-today)/86400000));

    let totalDone=0, totalKmActual=0;
    allRuns.forEach(r => {
        const rs = runState[r.id]||{};
        if (rs.done) { totalDone++; totalKmActual += parseFloat(rs.actualKm||0)||r.km; }
    });
    if (runState['race']?.done) totalDone++;

    document.getElementById('r-runs-done').textContent  = totalDone;
    document.getElementById('r-km-done').textContent    = Math.round(totalKmActual);
    document.getElementById('r-days-left').textContent  = daysLeft;
    const pct = Math.round(totalDone/(allRuns.length+1)*100);
    document.getElementById('r-overall-pct').textContent = pct+'%';
    document.getElementById('r-overall-bar').style.width = pct+'%';

    const container = document.getElementById('run-list');
    container.innerHTML = '';

    allRuns.forEach(r => {
        const rs = runState[r.id]||{};
        const isDone = !!rs.done;
        const rd = new Date(r.date+'T00:00:00'); rd.setHours(0,0,0,0);
        const isToday = rd.getTime()===today.getTime();
        const isPast  = rd < today;
        const isOpen  = !!runOpen[r.id];

        const actualLabel  = isDone&&rs.actualKm ? ` · ${rs.actualKm} km${rs.actualTime?' in '+rs.actualTime:''}` : '';
        const paceActual   = isDone&&rs.actualKm&&rs.actualTime
            ? `<span style="color:var(--blue);margin-left:8px">${calcPace(parseFloat(rs.actualKm),rs.actualTime)}/km actual</span>` : '';

        const row = document.createElement('div');
        row.className = 'flat-row'+(isToday?' is-today':'')+(isPast&&isDone?' is-past-done':'');

        const hdr = document.createElement('div'); hdr.className='flat-hdr';
        hdr.innerHTML = `
            <div class="run-cb ${isDone?'checked':''}" onclick="event.stopPropagation();window.toggleRun('${r.id}')">
                <svg class="run-check" width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 4L4 7L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="flat-date">${isToday?'<span style="color:var(--accent)">Today</span>':fmtDay(rd)}</div>
            <div class="flat-title">${r.km} km${actualLabel}</div>
            <span class="flat-tag" style="background:var(--blue-bg);color:var(--blue)">${r.pace}</span>
            <span class="flat-chev" style="transform:${isOpen?'rotate(180deg)':''}">▼</span>`;

        const body = document.createElement('div'); body.className='flat-body'+(isOpen?' open':'');
        body.style.cssText = 'padding:.75rem 1rem .75rem 14px;border-top:1px solid var(--card-border);background:#0f0f1a';
        body.innerHTML = `
            <div style="font-size:12px;color:#888;margin-bottom:.5rem">Log actual run${paceActual}</div>
            <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
                <input type="number" placeholder="km" step="0.01" min="0" value="${rs.actualKm||''}"
                    class="form-control form-control-sm" data-field="km" style="width:75px">
                <span style="color:#666;font-size:.85rem">in</span>
                <input type="text" placeholder="mm:ss" value="${rs.actualTime||''}"
                    class="form-control form-control-sm" data-field="time" style="width:75px">
                <button class="btn btn-sm" style="background:var(--blue);color:#fff;border:none"
                    onclick="window.saveRunLog('${r.id}',this)">Save</button>
            </div>`;

        hdr.onclick = () => {
            const nowOpen = !body.classList.contains('open');
            body.classList.toggle('open');
            hdr.querySelector('.flat-chev').style.transform = nowOpen?'rotate(180deg)':'';
            runOpen[r.id] = nowOpen;
        };

        row.append(hdr, body);
        container.appendChild(row);
    });

    // Race day
    const raceDone  = !!runState['race']?.done;
    const raceState = runState['race']||{};
    const raceRow   = document.createElement('div');
    raceRow.className = 'flat-row';
    raceRow.style.cssText = `border-color:${raceDone?'var(--green)':'var(--amber)'};margin-top:16px`;
    raceRow.innerHTML = `
        <div class="flat-hdr" style="cursor:default">
            <div class="run-cb ${raceDone?'checked':''}" style="${raceDone?'background:var(--green);border-color:var(--green);':''}cursor:pointer"
                onclick="window.toggleRaceDone()">
                <svg class="run-check" width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 4L4 7L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="flat-date" style="color:var(--amber);font-weight:700">31 May</div>
            <div class="flat-title" style="font-weight:700">🎯 Race day · 20 km</div>
            <span class="flat-tag tag-goal">sub 5:00/km</span>
        </div>
        ${raceDone?`<div style="padding:.5rem 1rem 1rem;font-size:13px;color:var(--green)">🎉 Finished! ${raceState.actualKm||20} km${raceState.actualTime?' in '+raceState.actualTime+' ('+calcPace(raceState.actualKm||20,raceState.actualTime)+'/km)':''}</div>`:''}`;
    container.appendChild(raceRow);
}

window.toggleRun = function(rid) {
    if (!runState[rid]) runState[rid]={};
    runState[rid].done = !runState[rid].done;
    saveRun(); renderRun();
};

window.saveRunLog = function(runId, btn) {
    const wrap = btn.closest('div');
    const km   = parseFloat(wrap.querySelector('[data-field="km"]').value);
    const time = wrap.querySelector('[data-field="time"]').value.trim();
    if (!km) { alert('Enter distance in km.'); return; }
    if (!runState[runId]) runState[runId]={};
    runState[runId].actualKm   = km;
    runState[runId].actualTime = time;
    runState[runId].done       = true;
    saveRun(); renderRun();
};

window.toggleRaceDone = function() {
    if (!runState['race']) runState['race']={};
    runState['race'].done = !runState['race'].done;
    saveRun(); renderRun();
};

// ═══════════════════════════════════════════════════
// BENCH TAB — flat list
// ═══════════════════════════════════════════════════

const exKey       = (sk,eid) => `${sk}__${eid}`;
const sessionDone = sk => EXERCISES.every(ex => planState[exKey(sk,ex.id)]);

function updateBenchStats() {
    const sd  = planSessions.filter(s=>sessionDone(s.key)).length;
    let   ed  = 0;
    planSessions.forEach(s => EXERCISES.forEach(ex => { if(planState[exKey(s.key,ex.id)]) ed++; }));
    const total=planSessions.length, te=total*EXERCISES.length;
    document.getElementById('b-sessions-done').textContent  = sd;
    document.getElementById('b-exercises-done').textContent = ed;
    document.getElementById('b-sessions-left').textContent  = total-sd;
    const pct = te>0?Math.round(ed/te*100):0;
    document.getElementById('b-overall-pct').textContent    = pct+'%';
    document.getElementById('b-overall-bar').style.width    = pct+'%';
}

function renderBench() {
    const today = new Date(); today.setHours(0,0,0,0);
    const container = document.getElementById('bench-list');
    container.innerHTML = '';

    // First non-done upcoming session
    const nextKey = planSessions.find(s => {
        const d = new Date(s.date); d.setHours(0,0,0,0);
        return d >= today && !sessionDone(s.key);
    })?.key;

    planSessions.forEach(s => {
        const sd    = new Date(s.date); sd.setHours(0,0,0,0);
        const isToday = sd.getTime()===today.getTime();
        const isPast  = sd < today;
        const done    = sessionDone(s.key);
        const exDone  = EXERCISES.filter(ex=>planState[exKey(s.key,ex.id)]).length;

        const autoOpen = isToday || s.key===nextKey;
        const isOpen   = benchOpen[s.key]!==undefined ? benchOpen[s.key] : autoOpen;

        const wLabel   = s.weight%1===0?s.weight+' kg':s.weight.toFixed(1)+' kg';
        const tagClass = done?'tag-done':s.isGoal?'tag-goal':'tag-normal';

        const row = document.createElement('div');
        row.className = 'flat-row'+(isToday?' is-today':'')+(isPast&&done?' is-past-done':'');

        const hdr = document.createElement('div'); hdr.className='flat-hdr';
        hdr.innerHTML = `
            <div class="flat-date">${isToday?'<span style="color:var(--accent)">Today</span>':fmtDay(sd)}</div>
            <div class="flat-title">Session ${s.indexInWeek===0?'A':'B'}${s.isGoal?' 🎯':''}</div>
            <span class="flat-tag ${tagClass}">${wLabel}</span>
            <span class="flat-prog">${exDone}/${EXERCISES.length}</span>
            <span class="flat-chev" style="transform:${isOpen?'rotate(180deg)':''}">▼</span>`;

        const body = document.createElement('div'); body.className='flat-body'+(isOpen?' open':'');

        EXERCISES.forEach(ex => {
            const k = exKey(s.key,ex.id), isDone = !!planState[k];
            const exRow = document.createElement('div');
            exRow.className = 'exercise-row'+(isDone?' done':'');
            exRow.innerHTML = `
                <div class="ex-cb ${isDone?'checked':''}">
                    <svg class="ex-check" width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <span class="ex-name">${ex.name}</span>
                <span class="ex-detail">${ex.detail(s.weight)}</span>`;
            exRow.onclick = () => {
                planState[k] = !planState[k];
                savePlan(); renderBench(); updateBenchStats();
            };
            body.appendChild(exRow);
        });

        hdr.onclick = () => {
            const nowOpen = !body.classList.contains('open');
            body.classList.toggle('open');
            hdr.querySelector('.flat-chev').style.transform = nowOpen?'rotate(180deg)':'';
            benchOpen[s.key] = nowOpen;
        };

        row.append(hdr, body);
        container.appendChild(row);
    });

    updateBenchStats();
}

// ═══════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════

window.switchTab = function(tab, btn) {
    ['schedule','running','bench'].forEach(t => {
        document.getElementById('tab-'+t).style.display = t===tab?'block':'none';
    });
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
};

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════

try {
    setLoading(true);
    await Promise.all([loadPlanState(), loadRunState(), loadScheduleEvents()]);
    window.renderSchedule();
    renderRun();
    renderBench();
} catch(e) {
    showError('Could not load data. Check Firestore rules or internet connection.');
}
setLoading(false);
</script>
</body>
